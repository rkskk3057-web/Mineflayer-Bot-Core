kind = "web"
previewPath = "/"
title = "Minecraft Bot Dashboard"
version = "1.0.0"
id = "artifacts/mc-bot-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23711

[services.development]
run = "pnpm --filter @workspace/mc-bot-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mc-bot-dashboard", "run", "build" ]
publicDir = "artifacts/mc-bot-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23711"
BASE_PATH = "/"
