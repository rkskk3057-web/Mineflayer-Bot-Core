openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Minecraft Bot API — Aegis Core
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot management
  - name: settings
    description: Settings management
  - name: tasks
    description: Task queue
  - name: servers
    description: Server config management
  - name: clones
    description: Clone bot management
  - name: waypoints
    description: Patrol waypoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get current bot status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/connect:
    post:
      operationId: connectBot
      tags: [bot]
      summary: Connect bot to server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectRequest"
      responses:
        "200":
          description: Connection initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/disconnect:
    post:
      operationId: disconnectBot
      tags: [bot]
      summary: Disconnect bot
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/reconnect:
    post:
      operationId: reconnectBot
      tags: [bot]
      summary: Reconnect bot
      responses:
        "200":
          description: Reconnecting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/command:
    post:
      operationId: sendBotCommand
      tags: [bot]
      summary: Send a command to the bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandRequest"
      responses:
        "200":
          description: Command sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/logs:
    get:
      operationId: getBotLogs
      tags: [bot]
      summary: Get recent bot logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsResponse"

  /bot/chat:
    post:
      operationId: sendBotChat
      tags: [bot]
      summary: Send chat message in-game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/inventory:
    get:
      operationId: getBotInventory
      tags: [bot]
      summary: Get bot inventory
      responses:
        "200":
          description: Inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current bot settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"

  /settings/whitelist:
    get:
      operationId: getWhitelist
      tags: [settings]
      summary: Get whitelist
      responses:
        "200":
          description: Whitelist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhitelistResponse"
    post:
      operationId: addToWhitelist
      tags: [settings]
      summary: Add player to whitelist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhitelistEntry"
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /settings/whitelist/{username}:
    delete:
      operationId: removeFromWhitelist
      tags: [settings]
      summary: Remove player from whitelist
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get task queue
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskQueueResponse"
    post:
      operationId: addTask
      tags: [tasks]
      summary: Add task to queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "200":
          description: Task added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /tasks/{taskId}:
    delete:
      operationId: removeTask
      tags: [tasks]
      summary: Remove task from queue
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /tasks/clear:
    post:
      operationId: clearTasks
      tags: [tasks]
      summary: Clear all tasks
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /servers:
    get:
      operationId: getServerConfigs
      tags: [servers]
      summary: Get saved server configs
      responses:
        "200":
          description: Server configs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfigsResponse"
    post:
      operationId: saveServerConfig
      tags: [servers]
      summary: Save a server config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerConfig"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /servers/{configId}:
    delete:
      operationId: deleteServerConfig
      tags: [servers]
      summary: Delete a server config
      parameters:
        - name: configId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /clones:
    get:
      operationId: getClones
      tags: [clones]
      summary: Get active clone bots
      responses:
        "200":
          description: Clones
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClonesResponse"
    post:
      operationId: spawnClone
      tags: [clones]
      summary: Spawn a new clone bot
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnCloneRequest"
      responses:
        "200":
          description: Clone spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /clones/all:
    delete:
      operationId: killAllClones
      tags: [clones]
      summary: Kill all clone bots
      responses:
        "200":
          description: All clones terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /clones/{id}:
    delete:
      operationId: killClone
      tags: [clones]
      summary: Kill a specific clone bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clone terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /waypoints:
    get:
      operationId: getWaypoints
      tags: [waypoints]
      summary: Get patrol waypoints
      responses:
        "200":
          description: Waypoints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaypointsResponse"
    post:
      operationId: addWaypoint
      tags: [waypoints]
      summary: Add a patrol waypoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWaypointRequest"
      responses:
        "200":
          description: Waypoint added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /waypoints/all:
    delete:
      operationId: clearWaypoints
      tags: [waypoints]
      summary: Clear all waypoints
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /waypoints/{id}:
    delete:
      operationId: removeWaypoint
      tags: [waypoints]
      summary: Remove a waypoint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    BotPosition:
      type: object
      properties:
        x: { type: number }
        y: { type: number }
        z: { type: number }
      required: [x, y, z]

    BotStatus:
      type: object
      properties:
        connected:
          type: boolean
        state:
          type: string
          enum: [IDLE, FOLLOW, GUARD, COMBAT, AUTONOMOUS, PATROL, DISCONNECTED]
        health:
          type: number
        food:
          type: number
        ping:
          type: number
        username:
          type: string
        serverHost:
          type: string
        serverPort:
          type: integer
        nearbyPlayers:
          type: integer
        currentTarget:
          type: string
          nullable: true
        ownerOnline:
          type: boolean
        cpuMode:
          type: string
          enum: [LOW, NORMAL, HIGH]
        autonomousMode:
          type: boolean
        uptime:
          type: integer
        position:
          $ref: "#/components/schemas/BotPosition"
          nullable: true
        kills:
          type: integer
        deaths:
          type: integer
        combatEnabled:
          type: boolean
        sneaking:
          type: boolean
        isSwimming:
          type: boolean
        cloneCount:
          type: integer
        lastError:
          type: string
          nullable: true
          description: "Most recent connection or runtime error"
        connectAttempts:
          type: integer
          description: "Number of connection attempts in current session"
        version:
          type: string
          description: "Negotiated Minecraft version (empty if not connected)"
      required:
        - connected
        - state
        - health
        - food
        - ping
        - username
        - serverHost
        - serverPort
        - nearbyPlayers
        - currentTarget
        - ownerOnline
        - cpuMode
        - autonomousMode
        - uptime
        - kills
        - deaths
        - combatEnabled
        - sneaking
        - isSwimming
        - cloneCount

    ConnectRequest:
      type: object
      properties:
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        owner:
          type: string
        version:
          type: string
          description: "Minecraft version (e.g. 1.20.4). Empty string = auto-detect."
      required: [host, port, username, owner]

    CommandRequest:
      type: object
      properties:
        command:
          type: string
          enum:
            - follow
            - guard
            - patrol
            - stop
            - sneak
            - attack_nearest
            - toggle_autonomous
            - toggle_combat
            - set_owner
            - check_owner
            - equip_weapon
            - equip_armor
        value:
          type: string
          nullable: true
      required: [command]

    ChatRequest:
      type: object
      properties:
        message:
          type: string
      required: [message]

    InventoryItem:
      type: object
      properties:
        name: { type: string }
        displayName: { type: string }
        count: { type: integer }
        slot: { type: integer }
        durability: { type: integer }
        equippedAs:
          type: string
          nullable: true
      required: [name, displayName, count, slot]

    InventoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        equipped:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
      required: [items]

    BotSettings:
      type: object
      properties:
        followDistance:
          type: number
        detectionRadius:
          type: number
        aggressionLevel:
          type: number
        attackDelay:
          type: integer
        scanInterval:
          type: integer
        cpuMode:
          type: string
          enum: [LOW, NORMAL, HIGH]
        autoReconnect:
          type: boolean
        reconnectDelay:
          type: integer
        owner:
          type: string
        combatEnabled:
          type: boolean
        autoEat:
          type: boolean
        antiAfk:
          type: boolean
        lootPickup:
          type: boolean
        criticalHits:
          type: boolean
        sneakFollow:
          type: boolean
      required:
        - followDistance
        - detectionRadius
        - aggressionLevel
        - attackDelay
        - scanInterval
        - cpuMode
        - autoReconnect
        - reconnectDelay
        - owner
        - combatEnabled
        - autoEat
        - antiAfk
        - lootPickup
        - criticalHits
        - sneakFollow

    ActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    LogEntry:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
        level:
          type: string
          enum: [info, warn, error, combat, state, connection]
        message:
          type: string
      required: [id, timestamp, level, message]

    LogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
      required: [logs]

    WhitelistEntry:
      type: object
      properties:
        username:
          type: string
      required: [username]

    WhitelistResponse:
      type: object
      properties:
        whitelist:
          type: array
          items:
            type: string
      required: [whitelist]

    BotTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [follow, guard_area, move_to, patrol]
        status:
          type: string
          enum: [pending, active, paused, done]
        params:
          type: object
          additionalProperties: true
      required: [id, type, status, params]

    CreateTaskRequest:
      type: object
      properties:
        type:
          type: string
          enum: [follow, guard_area, move_to, patrol]
        params:
          type: object
          additionalProperties: true
      required: [type, params]

    TaskQueueResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/BotTask"
      required: [tasks]

    ServerConfig:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        owner:
          type: string
      required: [name, host, port, username, owner]

    ServerConfigsResponse:
      type: object
      properties:
        configs:
          type: array
          items:
            $ref: "#/components/schemas/ServerConfig"
      required: [configs]

    CloneBot:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        status:
          type: string
          enum: [connecting, online, offline, error]
        health:
          type: number
        food:
          type: number
        state:
          type: string
        host:
          type: string
        port:
          type: integer
      required: [id, username, status, health, food, state, host, port]

    ClonesResponse:
      type: object
      properties:
        clones:
          type: array
          items:
            $ref: "#/components/schemas/CloneBot"
      required: [clones]

    SpawnCloneRequest:
      type: object
      properties:
        username:
          type: string

    WaypointEntry:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        x: { type: number }
        y: { type: number }
        z: { type: number }
      required: [id, label, x, y, z]

    WaypointsResponse:
      type: object
      properties:
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/WaypointEntry"
      required: [waypoints]

    AddWaypointRequest:
      type: object
      properties:
        label: { type: string }
        x: { type: number }
        y: { type: number }
        z: { type: number }
      required: [x, y, z]
